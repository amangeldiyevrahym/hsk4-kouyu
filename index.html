<script id="kyTrData" type="application/json">{"1": {"en": "Due to changes in eating habits, Chen Xinyang lost weight after winter break. In Malaysia she ate seafood almost every day, but in Beijing she always eats fried chicken. Beijing is not near the sea, so seafood prices are relatively high, and Chen Xinyang can't bear to buy it. Compared to Beijing, Malaysia has lower seafood prices and a greater variety. Park Jihye was late for class today because she hasn't adjusted her sleep schedule yet. Because Korean nightlife is rich, Park Jihye is used to staying up late. She didn't stay in the dorm last night, but went to the bar with friends and didn't come back until 4 AM. Unlike Korean students, Chinese students usually go to bed earlier because classes start earlier. Chinese people believe that going to bed early and waking up early is good for health.", "ru": "Из-за изменений в пищевых привычках Чэнь Синьян похудела после зимних каникул. В Малайзии она ела морепродукты почти каждый день, а в Пекине постоянно ест жареную курицу. Пекин не находится у моря, поэтому цены на морепродукты относительно высоки, и Чэнь Синьян не решается их покупать. Пак Чихе сегодня опоздала на занятия, потому что еще не настроила свой режим сна. Из-за богатой ночной жизни в Корее Пак Чихе привыкла поздно ложиться. Вчера вечером она не оставалась в общежитии, а пошла с друзьями в бар и вернулась только в 4 утра. В отличие от корейских студентов, китайские студенты обычно ложатся спать раньше, потому что занятия начинаются рано. Китайцы считают, что ранний отход ко сну и раннее пробуждение полезны для здоровья.", "tr": "Beslenme alışkanlıklarındaki değişiklikler nedeniyle, Chen Xinyang kış tatilinden sonra zayıfladı. Malezya'da neredeyse her gün deniz ürünü yiyordu, Pekin'de ise hep kızarmış tavuk yiyor. Pekin deniz kenarında olmadığı için deniz ürünleri fiyatları nispeten yüksek. Malezya'da deniz ürünleri daha ucuz ve çeşitleri daha zengin. Park Jihye bugün derse geç kaldı çünkü uyku düzenini henüz ayarlamamış. Kore gece hayatı zengin olduğu için Park Jihye geç yatmaya alışkın. Koreli öğrencilerin aksine, Çinli öğrenciler genelde erken yatarlar. Çinliler erken yatıp erken kalkmanın sağlığa iyi geldiğine inanır.", "ko": "첸신양은 식습관의 변화로 겨울방학 이후 살이 빠졌다. 말레이시아에서는 거의 매일 해산물을 먹었지만, 베이징에서는 항상 프라이드 치킨을 먹습니다. 베이징은 바다 근처에 있지 않기 때문에 해산물 가격이 상대적으로 높고, 첸신양은 그것을 구입할 수 없습니다. 말레이시아는 베이징에 비해 해산물 가격이 낮고 품종이 다양합니다. 박지혜가 오늘 수업에 늦은 이유는그는 아직 수면 스케줄을 조정하지 않았다. 한국의 밤문화는 풍부하기 때문에 박지혜는 늦잠을 자는 데 익숙합니다. 그녀는 어젯밤 도미토리에 머물지 않았지만 친구들과 바에 갔고 새벽 4시까지 돌아오지 않았습니다. 한국 학생들과 달리 중국 학생들은 수업이 일찍 시작되기 때문에 보통 일찍 잠자리에 듭니다. 중국 사람들은 일찍 자고 일찍 일어나는 것이 중국인에게 좋다고 생각합니다.ealth."}, "2": {"en": "New semester, classmates discuss going out for a group meal. Yamashita Kazuya doesn't like chili and lamb. Because Japanese food is light, strong-flavored foods are not very popular in Japan. Chen Xinyang is Muslim, she doesn't eat any non-halal meat. Park Jihye doesn't want to eat greasy fast food because she thinks it's unhealthy, and most importantly it makes you gain weight. But this way she also misses out on a lot of delicious food. I don't like eating organ meats and chicken feet. Organ meats taste strange, chicken feet look like human hands, to me they are all 'dark cuisine'. Finally Zhang Xiaowei suggested we go eat grilled fish — not only delicious but we can also eat vegetables.", "ru": "Новый семестр, однокурсники обсуждают совместный ужин. Ямасита Кадзуя не любит перец чили и баранину. Из-за того, что японская кухня легкая, сильно пахнущие продукты не очень популярны в Японии. Чэнь Синьян — мусульманка, она не ест нехаляльное мясо. Пак Чихе не хочет есть жирную еду вроде фастфуда. Я не люблю субпродукты и куриные лапки — для меня это 'темная кухня'. Чжан Сяовэй предложила пойти есть жареную рыбу — не только вкусно, но и можно поесть овощей.", "tr": "Yeni dönem, sınıf arkadaşları toplu yemek yemeye gitmeyi konuşuyor. Yamashita Kazuya acı biber ve kuzu eti sevmiyor. Japon yemekleri hafif olduğu için ağır kokulu yiyecekler Japonya'da pek popüler değil. Chen Xinyang Müslüman olduğu için helal olmayan etleri yemiyor. Park Jihye fast food gibi yağlı yiyecekler yemek istemiyor. Ben sakatat ve tavuk ayağı gibi şeyler yemiyorum — bana göre bunlar 'karanlık mutfak'. Zhang Xiaowei ızgara balık yemeye gitmemizi önerdi — sadece lezzetli değil, aynı zamanda sebze de yiyebiliriz.", "ko": "새 학기에는 급우들이 단체 식사를 하러 나가는 것에 대해 토론합니다. 야마시타 카즈야는 칠리와 양고기를 좋아하지 않습니다. 일본 음식은 가볍기 때문에 일본에서는 강한 맛의 음식이 그다지 인기가 없습니다. Chen Xinyang은 이슬람교도이며 할랄이 아닌 고기를 먹지 않습니다. 박지혜는 기름진 패스트푸드가 건강에 좋지 않다고 생각하기 때문에 먹기 싫어하고, 무엇보다 살이 찌게 만듭니다. 하지만 이런 식으로 그녀는lso는 맛있는 음식을 많이 놓칩니다. 저는 장기의 고기와 닭발을 먹는 것을 좋아하지 않습니다. 오르간 고기는 이상한 맛이 나고, 닭발은 사람의 손처럼 보이는데, 제게는 모두 '어두운 요리' 입니다. 마지막으로 장샤오웨이는 생선 구이를 먹으러 갈 것을 제안했습니다. 맛있을 뿐만 아니라 야채도 먹을 수 있습니다."}, "3": {"en": "The classmates invited Teacher Li to eat at a grilled fish restaurant. According to traditional Chinese custom, to show enthusiasm, the host should order more dishes when treating guests, so that the guests feel respected. So Zhang Xiaowei ordered two fish and added many dishes. Feng Shangde and Yamashita both disagreed, because ordering too much means leftovers. If you don't pack them, it's wasteful and a pity; if you pack them, eating leftover food isn't healthy. Teacher Li said that with social development, Chinese concepts have changed: to avoid waste, many people now practice 'clean plate' — finishing all the food on the plate. Finally, Yamashita suggested deciding the amount of food according to appetite.", "ru": "Однокурсники пригласили учителя Ли поесть в ресторан жареной рыбы. Согласно китайской традиции, чтобы показать гостеприимство, хозяин должен заказать побольше блюд. Чжан Сяовэй заказала две рыбы и много других блюд. Фэн Шандэ и Ямасита были против — слишком много еды. Учитель Ли сказал, что китайцы теперь практикуют 'чистую тарелку' — доедать все до конца. Ямасита предложил заказывать по аппетиту.", "tr": "Sınıf arkadaşları Öğretmen Li'yi ızgara balık restoranına yemeğe davet etti. Çin geleneğine göre, misafirperverliği göstermek için ev sahibi bol bol yemek ısmarlamalı. Zhang Xiaowei iki balık ve bir sürü yemek sipariş etti. Feng Shangde ve Yamashita itiraz etti. Öğretmen Li Çinlilerin artık 'temiz tabak' yaptığını söyledi. Yamashita iştaha göre sipariş vermeyi önerdi.", "ko": "반 친구들은 리 선생님을 생선구이집으로 초대했다. 중국 전통 관습에 따라, 호스트는 게스트를 대할 때 더 많은 요리를 주문하여 게스트를 존중해야 합니다. 그래서 장샤오웨이는 생선 두 마리를 주문하고 많은 요리를 추가했습니다. 펑샹더 (Feng Shangde) 와 야마시타 (Yamashita) 는 모두 동의하지 않았습니다. 너무 많이 주문하면 남은 음식이 남기 때문입니다. 포장하지 않으면 폐기물입니다.만족스럽고 안타깝습니다. 포장하면 남은 음식을 먹는 것이 건강에 좋지 않습니다. 리 교사는 사회 발전과 함께 중국의 개념이 바뀌었다고 말했습니다. 낭비를 피하기 위해 많은 사람들이 이제 접시에 있는 모든 음식을 마무리하는 '깨끗한 접시' 를 실천하고 있습니다. 마지막으로 야마시타는 식욕에 따라 음식의 양을 결정하자고 제안했다."}, "4": {"en": "There's a place in Beijing called 'Luogu Alley'. There are many hutongs and well-preserved courtyard houses there. Why is it called 'Luogu Alley'? You can't explain it literally, because there are no gongs or drums there. So how did the name come about? In ancient times, the street was originally called 'Luoguo Alley', because it was high in the middle and low at the north and south ends, like a hunchback (luoguo). So the common people gave it this vivid name. But later an emperor thought the name wasn't pleasant, so he changed it to a similar-sounding name, 'Luogu Alley' (gongs and drums). From then on, the name 'Luogu Alley' has been passed down.", "ru": "В Пекине есть место под названием 'Логу' — переулок барабанов и гонгов. Там много хутунов. Почему его так назвали? Буквально — нет там ни барабанов, ни гонгов. Раньше он назывался 'Горбатый переулок', потому что середина была высокой. Но императору название не понравилось, и он заменил его на 'Барабанно-гонговый переулок'.", "tr": "Pekin'de 'Luogu Sokağı' denen bir yer var. Birçok hutong var. Neden 'Luogu Sokağı' deniyor? Kelime anlamına bakmayın, ne davul ne gong var. Eskiden 'Kambur Sokak'mış, bir imparator beğenmeyip adını değiştirmiş.", "ko": "베이징에 '루오구 골목' 이라는 곳이 있습니다. 그곳에는 많은 후통과 잘 보존된 안뜰 주택이 있습니다. 왜 '루오구 골목' 이라고 하지? 징이나 드럼이 없기 때문에 문자 그대로 설명할 수 없습니다. 그렇다면 그 이름은 어떻게 생겨났을까요? 고대에 이 거리는 원래 '루오궈 골목 (Luoguo Alley)' 이라고 불렸는데, 북쪽과 남쪽 끝이 높고 낮았기 때문이다.unchback (luoguo). 그래서 서민들은 이 생생한 이름을 붙였습니다. 하지만 나중에 황제는 그 이름이 유쾌하지 않다고 생각해서 비슷한 소리인 '루오구 골목' (징과 북) 으로 바꿨다. 그때부터 '루오구 골목' 이라는 이름이 전해졌습니다."}, "5": {"en": "What causes the fast pace of life nowadays? On one hand, the fiercely competitive environment forces people to study and work hard, not daring to slow down. On the other hand, with social development, 'speed' has become the watchword of the era, as if everything is better when done faster. But a busy life easily makes people ignore the beauty around them, even becoming anxious and impatient. If you can reduce your desires and let life slow down, life becomes simpler. We can slowly do things we enjoy, only then can we experience more beauty.", "ru": "Что вызывает быстрый темп жизни сегодня? С одной стороны, жесткая конкуренция заставляет людей много работать. С другой стороны, 'быстро' стало лозунгом эпохи. Но занятая жизнь заставляет людей не замечать красоту вокруг. Если уменьшить желания и дать жизни замедлиться, она станет проще. Можно не спеша заниматься любимыми делами.", "tr": "Bugün hayatın hızlı temposuna ne sebep oluyor? Rekabetçi ortam insanları çok çalışmaya zorluyor. 'Hız' çağın sloganı haline geldi. Ama yoğun hayat insanların etrafındaki güzellikleri fark etmesini engelliyor. İstekleri azaltıp hayatı yavaşlatırsak, hayat daha basit olur.", "ko": "요즘 삶의 빠른 속도의 원인은 무엇입니까? 한편으로, 치열한 경쟁 환경은 사람들이 감히 속도를 늦추지 않고 열심히 공부하고 일하도록 강요합니다. 반면에 사회 발전에 따라 '속도' 는 모든 것이 더 빨라지면 더 좋아지는 것처럼 시대의 표어가 되었습니다. 그러나 바쁜 삶은 사람들이 주변의 아름다움을 무시하고 심지어 불안하고 참을성이 없게 만듭니다. 만약 당신이u는 당신의 욕망을 줄이고 인생을 느리게 할 수 있으며, 인생은 더 단순해집니다. 우리는 천천히 즐기는 일을 할 수 있습니다. 그래야만 더 많은 아름다움을 경험할 수 있습니다."}, "6": {"en": "Zhang Xiaowei recommends e-books to Feng Shangde, citing three advantages: First, e-books can be stored on phones or e-readers, which are light and thin, don't take up space in a bag, and aren't heavy to carry. Second, e-books are cheap — the cost of one paper book can buy several e-books. Third, paper books easily get wet or dirty, but e-books don't. Feng Shangde however thinks e-books are not as good as paper books. Paper books feel good to touch, giving the 'feeling of reading', and are more convenient for flipping pages. So he believes e-books can't replace paper books.", "ru": "Чжан Сяовэй рекомендует Фэн Шандэ электронные книги. У них три преимущества: удобно хранить, дешево, не боятся влаги и грязи. Фэн Шандэ считает, что бумажные книги лучше: у них приятные тактильные ощущения, и удобнее листать страницы.", "tr": "Zhang Xiaowei Feng Shangde'ye e-kitap öneriyor: taşınabilir, hafif, ucuz, ıslanmaz kirlenmez. Feng Shangde kağıt kitapların daha iyi olduğunu düşünüyor: dokunma hissi, sayfa çevirme kolaylığı. E-kitapların kağıt kitapların yerini alamayacağını söylüyor.", "ko": "Zhang Xiaowei는 세 가지 장점을 언급하며 Feng Shangde에게 전자책을 추천합니다. 첫째, 전자책은 가볍고 얇으며 가방에 공간을 차지하지 않고 휴대하기에 무겁지 않은 휴대폰이나 전자책 리더기에 보관할 수 있습니다. 둘째, 전자책은 저렴합니다. 종이책 한 권의 비용으로 여러 권의 전자책을 구입할 수 있습니다. 셋째, 종이책은 쉽게 젖거나 더러워지지만 전자책은 그렇지 않습니다. 그러나 펑샹더는 전자책이종이책처럼 좋습니다. 종이책은 만지기 좋은 느낌으로 '읽는 느낌' 을 주며, 페이지를 넘기기에 더 편리합니다. 그래서 그는 전자책이 종이책을 대체할 수 없다고 믿습니다."}, "7": {"en": "The internet can shorten the distance between people in some ways. Ma Bolo is studying in China. He can contact his parents through the internet and freely communicate, making him feel not so far from home. Yamashita met several new friends on a Chinese learning website, where they share methods for learning Chinese. But in other ways, the internet can also make feelings cold. In the past, people visited relatives and friends in person for New Year's. Now many just send a quick greeting online, which seems less sincere.", "ru": "Интернет сокращает расстояния между людьми. Ма Боло может общаться с родителями через интернет. Ямасита нашел друзей на сайте изучения китайского. Но интернет также делает отношения холоднее: раньше люди ходили друг к другу в гости на Новый год, а теперь просто шлют онлайн-поздравления.", "tr": "İnternet mesafeleri kısaltıyor. Ma Bolo ailesiyle internet üzerinden iletişim kurabiliyor. Yamashita Çince öğrenme sitesinde arkadaşlar buldu. Ama internet ilişkileri soğutuyor: eskiden Yeni Yıl ziyaretleri vardı, şimdi çevrimiçi selamlar — samimiyetsiz.", "ko": "인터넷은 어떤 면에서는 사람들 사이의 거리를 줄여준다. 마볼로는 중국에서 유학 중이다. 인터넷으로 부모님과 자유롭게 연락할 수 있어 집에서 멀지 않은 것 같은 기분이 든다. 야마시타는 중국어 학습 사이트에서 새 친구들을 만나 학습 방법을 공유한다. 하지만 인터넷은 또한 관계를 차갑게 만들기도 한다. 예전에는 설날에 직접 친척과 친구들을 방문했지만 지금은 많은 사람들이 그냥 온라인으로 간단히 인사만 한다. 이는 덜 진실해 보인다."}, "8": {"en": "People from different countries have different choices for wedding gifts. Germans emphasize practicality — the couple makes a list of desired gifts for guests to choose from. In Korea and China, people give cash gifts. Koreans use white envelopes, Chinese use red. White in Korea signifies formality, red in China represents festivity. Chinese have many rules: amounts should contain lucky numbers like '6', '8', '9', and the envelope should have good wishes written on it.", "ru": "В разных странах разные свадебные подарки. Немцы дарят практичные вещи по списку. В Корее и Китае дарят деньги: корейцы — в белых конвертах, китайцы — в красных. Сумма должна содержать счастливые цифры 6, 8, 9.", "tr": "Farklı ülkelerde düğün hediyeleri farklı. Almanlar pratik hediyeler verir, Kore ve Çin'de para zarfı: Koreliler beyaz, Çinliler kırmızı. Miktar 6, 8, 9 gibi uğurlu sayılar içermeli.", "ko": "나라마다 결혼 선물 선택이 다르다. 독일인은 실용성을 중시한다. 신랑 신부가 선물 리스트를 만들면 손님들이 고른다. 한국과 중국에서는 보통 축의금을 낸다. 다른 점은 한국인은 하얀 봉투를, 중국인은 빨간 봉투를 사용한다. 중국에서는 축의금 액수에 6, 8, 9 같은 행운의 숫자가 들어가는 것이 좋고 봉투에는 축복을 적는다."}, "9": {"en": "This is my first time attending a Chinese wedding — so interesting! Chinese weddings are usually at hotels, with three parts: picking up the bride, the ceremony, and the banquet. First, the groom must pass 'tests' by the bride's friends. Then the ceremony: many Chinese now like Chinese-Western fusion weddings, with cross-cupped wine and ring exchange. Finally the banquet: the bride changes into traditional clothes and toasts guests with the groom.", "ru": "Впервые на китайской свадьбе — очень интересно! Свадьбы обычно в отелях: выкуп невесты, церемония и банкет. Сейчас популярно смешение китайской и западной традиций.", "tr": "İlk kez Çin düğününe katılıyorum — çok ilginç! Otelde olur: gelin alma, tören, ziyafet. Çin-Batı karışımı düğünler popüler.", "ko": "처음으로 중국 결혼식에 참석했다. 정말 재미있다! 중국 결혼식은 보통 호텔에서 한다. 신부 맞이, 의식, 연회 세 부분으로 구성된다. 먼저 신랑은 신부 친구들이 준비한 '시험'을 통과해야 한다. 그다음 의식에서는 많은 중국인들이 중국과 서양이 결합된 결혼식을 선호한다. 마지막으로 연회에서 신부는 전통 옷으로 갈아입고 신랑과 함께 하객들에게 술을 따라주며 감사를 표한다."}, "10": {"en": "If someone asks to cut in line, should we let them? Ma Bolo thinks yes — refusing makes you feel unkind. Agreeing may delay a little but you won't lose anything. Feng Shangde thinks no — queuing is a rule everyone should follow. The person cutting makes others wait longer, which is unfair. If there are people behind you, letting someone cut is also unfair to them.", "ru": "Если кто-то просит пройти без очереди — стоит ли разрешать? Ма Боло считает, что стоит. Фэн Шандэ против — очередь это правило, пропускать кого-то несправедливо.", "tr": "Sıraya kaynak yapmak isteyene izin vermeli mi? Ma Bolo evet diyor. Feng Shangde hayır diyor — sıra kuraldır, kaynak yapan haksızlık yapıyor.", "ko": "누군가 새치기를 요청하면 허락해야 할까? 의견이 둘로 나뉜다. 마볼로는 허락해야 한다고 생각한다. 거절하면 자신이 친절하지 않다고 느껴 마음이 불편하기 때문이다. 하지만 펑상더는 안 된다고 생각한다. 줄 서기는 모두가 지켜야 할 규칙이다. 새치기하는 사람은 다른 사람들을 더 오래 기다리게 하므로 불공평하다."}, "11": {"en": "China has a performance art called 'xiangsheng' (cross-talk). Its style is humorous, full of jokes that make audiences laugh. Performance forms vary: solo (single cross-talk), duo, or group. Performing xiangsheng isn't easy — artists master four skills: speaking, imitating, teasing, and singing. They need lots of practice.", "ru": "В Китае есть искусство «сяншэн» — комедийный диалог. Формы: соло, дуэт, группа. Четыре урока: говорить, подражать, шутить, петь.", "tr": "Çin'de 'xiangsheng' denen komedi sanatı var. Türleri: tek kişilik, ikili, grup. Dört beceri: konuşma, taklit, şaka, şarkı.", "ko": "중국에는 '샹성(相声)'이라는 공연 예술이 있다. 유머러스한 스타일로 관객을 웃게 만든다. 형식도 다양하다. 혼자 하는 '단구샹성', 둘이 하는 '대구샹성', 여러 명이 하는 '군구샹성'이 있다. 샹성 연기는 쉽지 않다. 네 가지 기술이 필요하다: 말하기, 흉내내기, 농담하기, 노래하기. 그래서 많은 연습이 필요하다."}, "12": {"en": "Chen Xinyang's mother taught her life knowledge and housework — practical skills that make her feel she can survive anywhere. Park Jihye's mother taught her manners for different social situations. My father is strict — he helps with studies and teaches diligence. Under his influence, I got into a good university.", "ru": "Мама Чэнь Синьян научила ее жизненным навыкам. Мама Пак Чихе — этикету. Папа был строг, учил усердию. Благодаря ему я поступил в хороший университет.", "tr": "Chen Xinyang'ın annesi hayat becerileri öğretti. Park Jihye'nin annesi görgü kuralları öğretti. Babam çalışkanlığı öğretti, iyi üniversite kazanmamı sağladı.", "ko": "천신양의 엄마는 생활 상식과 집안일을 가르쳐 줬다. 아주 실용적인 지식이라 어디서든 살아남을 수 있다고 생각한다. 박지혜의 엄마는 예절을 가르쳐 주고 신분이 다른 사람과 어떻게 대화해야 하는지 알려줬다. 우리 아버지는 엄격하셨다. 공부도 도와주고 근면과 성실함을 가르쳐 주셨다. 아버지의 영향으로 좋은 대학에 합격할 수 있었다."}, "13": {"en": "We can save electricity through small daily actions. Instead of AC, open windows for ventilation — fresher air and power saving. People forget to turn off lights or leave appliances plugged in. If not using for a long time, unplug — plugged-in devices still consume power.", "ru": "Можно экономить электричество: проветривать вместо кондиционера, выключать свет, отключать приборы от розетки. Даже выключенные приборы в розетке потребляют энергию.", "tr": "Küçük şeylerle elektrik tasarrufu yapabiliriz: klima yerine pencere aç, ışıkları kapat, fişten çek. Fişteki kapalı aletler bile elektrik harcar.", "ko": "일상생활에서 작은 일들로 전기를 절약할 수 있다. 날씨가 더울 때 에어컨 대신 창문을 열어 자연 바람으로 실내 온도를 조절하는 게 더 좋다. 공기도 바꾸고 전기도 절약한다. 방을 나갈 때 불을 끄지 않거나 가전제품 코드를 뽑지 않는 것은 잘못된 습관이다. 오랫동안 사용하지 않으면 전원을 차단하는 게 좋다. 코드를 꽂아두기만 해도 전기가 소비되기 때문이다."}, "14": {"en": "Shopping priorities differ. Some value quality first — 'you get what you pay for'. Higher price usually means better quality and style. Some prefer good and cheap — buy more for the same money. Others focus on cost-performance ratio, picking frequently-used items at reasonable prices.", "ru": "Приоритеты в покупках разные. Одним важно качество — «за что платишь, то и получаешь». Другим — дешево и качественно. Третьим — соотношение цены и качества.", "tr": "Alışveriş öncelikleri farklı. Kimine kalite önemli, kimine ucuzluk, kimine fiyat-performans oranı.", "ko": "물건을 살 때 사람마다 중점을 두는 것이 다르다. 어떤 사람들은 품질을 가장 중요하게 생각한다. '값싼 게 비지떡'이라는 말처럼 가격이 높으면 보통 품질이 더 좋다. 어떤 사람들은 싸고 좋은 것을 중요하게 여긴다. 같은 돈으로 더 많은 것을 살 수 있기 때문이다. 또 어떤 사람들은 가성비를 중요하게 생각한다. 사용 빈도가 높고 가격이 합리적인 제품을 고르는 데 시간을 투자한다."}, "15": {"en": "The 5th day of the 5th lunar month is the Dragon Boat Festival. Eating zongzi is a key custom. Legend says it relates to Qu Yuan, a patriotic poet. He was a high official who loved his country. When Chu fell, he jumped into the river. People threw rice in bamboo leaves into the river to feed fish so they wouldn't bite his body. This became the tradition of eating zongzi.", "ru": "5-й день 5-го месяца — Праздник драконьих лодок. Легенда о Цюй Юане, который бросился в реку. Люди бросали рис в бамбуковых листьях рыбам — так появился обычай есть цзунцзы.", "tr": "Ejderha Teknesi Festivali. Qu Yuan efsanesi — kendini nehre atan vatansever şair. Balıklar yemesin diye nehire pirinç atarlarmış. Bu gelenek zongzi yeme âdetine dönüştü.", "ko": "매년 음력 5월 5일은 중국의 전통 명절인 단오절이다. 단오절에 쭝쯔(粽子)를 먹는 것은 중요한 풍습 중 하나다. 이 풍습은 애국 시인 굴원과 관련이 있다. 굴원은 초나라의 고위 관리로 자신의 나라를 사랑했다. 초나라가 망한 후 굴원은 강에 몸을 던졌다. 후에 매년 단오절이 되면 백성들이 대나무 잎에 밥을 싸서 강에 던져 물고기를 먹였다. 물고기가 배불러 굴원의 시신을 건드리지 않도록 하기 위해서였다. 이 방식이 점차 쭝쯔를 먹는 풍습으로 자리 잡았다."}, "16": {"en": "Different people like different vacation styles. Chinese like traveling to famous spots and trying local food. Germans go to sunny places for walking and sunbathing — their winters are long and dark. French love the southern beaches or the countryside, embracing nature.", "ru": "Стили отдыха разные. Китайцы путешествуют. Немцы едут к солнцу — у них долгая зима. Французы любят южные пляжи или деревню.", "tr": "Tatil stilleri farklı. Çinliler gezer, Almanlar güneşe gider, Fransızlar sahile veya kırsala kaçar.", "ko": "사람마다 좋아하는 휴가 방식이 다르다. 많은 중국인들은 여행을 좋아한다. 유명한 관광지를 방문하고 특색 있는 음식을 맛본다. 독일은 겨울이 길고 여름이 짧아 햇빛이 부족하기 때문에 많은 독일인들이 햇빛이 좋은 곳으로 휴가를 간다. 산책하고 일광욕을 하며 휴식을 취한다. 프랑스인들은 남부 해변에서 일광욕을 하거나 시골에서 휴가를 보내며 자연을 즐기기를 좋아한다."}}</script>

var timerInterval = null;
var spinInterval = null;
var quizIndex = 0, correctCount = 0, wrongCount = 0;
var quizOrder = [];
var wheelOrder = [], wheelIndex = 0, wheelScore = 0, wheelTotal = 0;

function g(id){return document.getElementById(id);}

function speakWord(text){
  try{
    if(text && window.speechSynthesis){
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.lang = "zh-CN";
      u.rate = 0.9;
      window.speechSynthesis.speak(u);
    }
  }catch(e){}
}

function closeModalFunc(){
  clearTimeout(timerInterval);
  clearInterval(spinInterval);
  timerInterval = null;
  spinInterval = null;
  g("modalOverlay").className = "mn";
}

function filterWords(){
  var q = g("searchInput").value.toLowerCase();
  var html = "";
  if(!q){
    for(var ci=0; ci<CATEGORIES.length; ci++){
      var cat = CATEGORIES[ci];
      var catWords = [];
      for(var i=0; i<DATA.length; i++){
        if(DATA[i].n >= cat[0] && DATA[i].n <= cat[1]) catWords.push(DATA[i]);
      }
      if(catWords.length === 0) continue;
      html += "<div class=\"cat\"><div class=\"cat-h\" onclick=\"toggleCat(this)\" style=\"border-left:4px solid " + cat[3] + "\"><span>" + cat[2] + "</span><span class=\"cnt\">" + catWords.length + "</span></div><div class=\"cat-b\">";
      for(var i=0; i<catWords.length; i++){
        var w = catWords[i];
        html += "<div class=\"w\"><span class=\"num\">" + w.n + "</span><span class=\"cn\" onclick=\"speakWord('" + w.c + "')\" >" + w.c + "</span><span class=\"py\">" + w.p + "</span><div class=\"ml\"><div class=\"l\">EN: " + w.en + "</div><div class=\"l\">RU: " + w.ru + "</div><div class=\"l\">KO: " + (w.ko||"") + "</div><div class=\"l\">TR: " + w.tr + "</div><div class=\"l ex\">💬 " + (w.ex || '') + "</div></div></div>";
      }
      html += "</div></div>";
    }
    g("listView").innerHTML = html;
    return;
  }
  for(var i=0; i<DATA.length; i++){
    var w = DATA[i];
    if(w.c.indexOf(q)>=0 || w.p.toLowerCase().indexOf(q)>=0 || w.tr.toLowerCase().indexOf(q)>=0 || w.en.toLowerCase().indexOf(q)>=0 || w.ru.toLowerCase().indexOf(q)>=0 || (w.ko||"").toLowerCase().indexOf(q)>=0){
      html += "<div class=\"w\"><span class=\"num\">" + w.n + "</span><span class=\"cn\" onclick=\"speakWord('" + w.c + "')\" >" + w.c + "</span><span class=\"py\">" + w.p + "</span><div class=\"ml\"><div class=\"l\">EN: " + w.en + "</div><div class=\"l\">RU: " + w.ru + "</div><div class=\"l\">KO: " + (w.ko||"") + "</div><div class=\"l\">TR: " + w.tr + "</div><div class=\"l ex\">💬 " + (w.ex || '') + "</div></div></div>";
    }
  }
  g("listView").innerHTML = html || "<div style=\"text-align:center;padding:30px;color:#555\">Not Found</div>";
}

function toggleCat(el){
  el.nextElementSibling.classList.toggle("o");
}

function switchMode(mode){
  document.querySelectorAll(".ct .btn").forEach(function(b){b.classList.remove("a");});
  closeModalFunc();
  g("lessonsView").style.display = "none";
    g("listView").style.display = "block";
  g("quizView").className = "qu";
  if(mode === "list"){
    g("btnList").classList.add("a");
  }else if(mode === "quiz"){
    g("btnQuiz").classList.add("a");
    g("listView").style.display = "none";
    g("quizView").className = "qu o";
    startQuiz();
  }else if(mode === "wheel"){
    g("btnWheel").classList.add("a");
    g("listView").style.display = "none";
    openWheel();
  }else if(mode === "lessons"){
    g("btnLessons").classList.add("a");
    g("listView").style.display = "none";
    g("lessonsView").style.display = "block";
    g("quizView").className = "qu";
    showLessons();
  }
}

// QUIZ
function startQuiz(){
  quizOrder = [];
  for(var i=0; i<DATA.length; i++) quizOrder.push(i);
  quizOrder.sort(function(){return Math.random()-0.5});
  quizIndex = 0; correctCount = 0; wrongCount = 0;
  g("quizEndView").className = "qe";
  showQuizQuestion();
}

function showQuizQuestion(){
  if(quizIndex >= DATA.length){
    g("quizWord").textContent = "🎉";
    g("quizPinyin").textContent = "";
    g("quizMeaning").textContent = "";
    g("quizEndView").className = "qe o";
    g("finalCorrect").textContent = correctCount;
    g("finalWrong").textContent = wrongCount;
    g("scoreDisplay").textContent = correctCount;
    return;
  }
  var w = DATA[quizOrder[quizIndex]];
  g("quizProgress").textContent = (quizIndex+1) + "/" + DATA.length;
  g("quizWord").textContent = w.c;
  g("quizPinyin").textContent = w.p;
  g("quizMeaning").innerHTML = "EN: " + w.en + "<br>RU: " + w.ru + "<br>KO: " + (w.ko||"") + "<br>TR: " + w.tr + "<br><span style='color:#ffd700;font-style:italic'>💬 " + (w.ex || '') + "</span>";
  g("scoreDisplay").textContent = correctCount;
}

function quizCorrect(){correctCount++; quizIndex++; showQuizQuestion();}
function quizWrong(){wrongCount++; quizIndex++; showQuizQuestion();}
function quizSkip(){quizIndex++; showQuizQuestion();}

// WHEEL
function openWheel(){
  wheelOrder = [];
  for(var i=0; i<DATA.length; i++) wheelOrder.push(i);
  wheelOrder.sort(function(){return Math.random()-0.5});
  wheelIndex = 0; wheelScore = 0; wheelTotal = 0;
  g("modalOverlay").className = "mn o";
  doWheelSpin();
}

function doWheelSpin(){
  if(wheelIndex >= DATA.length){
    g("modalInner").innerHTML = "<button class=\"x\" onclick=\"closeModalFunc()\">X</button><h2>🎡 Wheel Done</h2><div style=\"font-size:18px;color:#fff;margin:12px\">Score: " + wheelScore + "/" + wheelTotal + "</div><button class=\"btn\" onclick=\"openWheel()\">Again</button>";
    return;
  }
  g("modalInner").innerHTML = "<button class=\"x\" onclick=\"closeModalFunc()\">X</button><h2>🎡 Wheel</h2><div class=\"wt\" id=\"wheelTimer\">3</div><div class=\"ww sp\" id=\"wheelDisplay\">Donuyor...</div>";
  var count = 3;
  spinInterval = setInterval(function(){
    var r = Math.floor(Math.random() * DATA.length);
    g("wheelDisplay").textContent = DATA[r].c;
  }, 80);
  timerInterval = setInterval(function(){
    count--;
    g("wheelTimer").textContent = count;
    if(count <= 0){
      clearInterval(timerInterval); timerInterval = null;
      clearInterval(spinInterval); spinInterval = null;
      showWheelWord();
    }
  }, 1000);
}

function showWheelWord(){
  var w = DATA[wheelOrder[wheelIndex]];
  g("wheelDisplay").textContent = w.c;
  g("wheelDisplay").className = "ww an";
  g("modalInner").innerHTML += "<div class=\"wans\">" + w.p + "<br>EN: " + w.en + "<br>RU: " + w.ru + "<br>KO: " + (w.ko||"") + "<br>TR: " + w.tr + "<br><span class='wex'>💬 " + (w.ex || '') + "</span></div><div class=\"wnb\"><button class=\"bk\" onclick=\"wheelCorrect()\">I know it</button><button class=\"bn\" onclick=\"wheelWrong()\">Don't know</button><button class=\"bs\" onclick=\"wheelSkip()\">Skip</button></div>";
  speakWord(w.c);
  var timeLeft = 12;
  g("wheelTimer").textContent = timeLeft;
  timerInterval = setInterval(function(){
    timeLeft--;
    g("wheelTimer").textContent = timeLeft;
    if(timeLeft <= 0){
      clearInterval(timerInterval); timerInterval = null;
      wheelTotal++;
      setTimeout(function(){wheelIndex++; doWheelSpin();}, 600);
    }
  }, 1000);
}

function wheelCorrect(){
  if(!timerInterval) return;
  clearInterval(timerInterval); timerInterval = null;
  wheelScore++; wheelTotal++;
  setTimeout(function(){wheelIndex++; doWheelSpin();}, 400);
}
function wheelWrong(){
  if(!timerInterval) return;
  clearInterval(timerInterval); timerInterval = null;
  wheelTotal++;
  setTimeout(function(){wheelIndex++; doWheelSpin();}, 400);
}
function wheelSkip(){
  if(!timerInterval) return;
  clearInterval(timerInterval); timerInterval = null;
  wheelTotal++;
  setTimeout(function(){wheelIndex++; doWheelSpin();}, 400);
}

// INIT
filterWords();

  {id:1, title:'第1课 不一样的习惯', text:'由于饮食习惯的改变，寒假以后陈新阳瘦了。在马来西亚她几乎 每天吃海鲜，在北京总是吃炸鸡。北京不在海边，海鲜价格相对较 高，陈新阳舍不得买。马来西亚和北京相比，海鲜价格低，种类也更 丰富。 朴智慧今天上课迟到了，因为她还没有调整好作息时间。由于韩 国夜生活丰富，朴智慧习惯了熬夜。她昨晚没有待在宿舍里，而是和 朋友们一起去了酒吧，夜里四点才回来。和韩国学生不同，中国学生 因为上课时间较早，所以通常会早点儿睡觉。中国人认为早睡早起有 利于身体健康。'},

  {id:3, title:'第3课 你点多了', text:'同学们请李老师在烤鱼店吃饭。按照中国的传统习惯，为了表示 热情，请客的时候主人应该多点一些菜，这样招待客人才有面子。所 以张小薇就点了两条鱼，还加了很多菜。冯尚德、山下和也都不同意， 因为菜点得太多就会剩下，如果不打包，就难免造成浪费，很可惜； 如果打包带走，吃剩菜又不健康。李老师说，随着社会的发展，中国 人的观念也发生了改变：为避免浪费，现在很多人开始讲“光盘”， 就是把盘子里的菜吃光。最后山下和也建议根据菜量决定点多少菜。'},
  {id:4, title:'第4课 名字里边有故事', text:'北京有一个地方叫“锣鼓巷”。那里有不少胡同儿，还有被保护 得很好的四合院。“锣鼓巷”为什么叫这个名字呢？你不能从文字表 面上解释，因为那里根本就没有锣和鼓。那这个名字是怎么来的呢？ 在古代，那条街本来叫“罗锅巷”，因为它中间高、南北低，像个罗 锅似的，所以老百姓就给它起了这个形象的名字。可是后来有一位皇 帝觉得这个名字不好听，就换了一个发音相似的，叫“锣鼓巷”。从 此，“锣鼓巷”这个名字就传下来了。'},
  {id:5, title:'第5课 朋友，慢点儿', text:'是什么原因造成了现在快节奏的生活？一方面，竞争激烈的生活 环境导致人们不得不拼命学习和工作，不敢慢下来。另一方面，随着 社会的发展，“快”成为时代的主张，好像什么都是越快越好。但是 忙碌的生活容易让人忽视身边的美好，甚至变得焦虑、不耐烦。如果 能减少自己的欲望，让生活慢下来，生活就会变得更简单。我们可以 慢慢地做喜欢的事，这样才能体会到更多的美好。'},
  {id:6, title:'第6课 我看电子书', text:'张小薇向冯尚德推荐电子书，因为它有三个优点：第一，电子书 可以存在手机或阅读器上，又轻又薄，放在包里不占地方，节省空 间，随身带着也不重；第二，电子书便宜，一本纸质书的钱可以买好 几本电子书；第三，纸质书容易被弄湿、弄脏，电子书不会。冯尚德 却觉得电子书不如纸质书。一方面，纸质书摸着有手感，能给人带来 “读书的感觉”，电子书却不能；另一方面，电子书不如纸质书翻页 方便。所以，他认为电子书代替不了纸质书。'},
  {id:7, title:'第7课 地球是一个村', text:'网络在一些方面能缩短人与人之间的距离。马波罗在中国留学， 他可以通过互联网跟父母联系，自由地交流，这让他觉得自己好像离 家没那么远，就不会那么想家了；山下和也在一个学汉语的网站上认 识了几个新朋友，他们互相交流学汉语的方法，扩大了自己的朋友 圈。在另外一些方面，网络也会使人们之间的感情变得冷淡。以前人 们拜年都是亲自到亲人朋友家里，现在很多人只是通过网络简单问候 一下，显得不那么诚恳了。'},
  {id:8, title:'第8课 结婚送什么？', text:'不同国家的人在结婚礼物的选择上也有所不同。德国人讲究礼物 的实用性，新人通常会列一份想要的礼物清单，清单里大部分是生活 用品，供客人挑选。韩国和中国一般通过送礼金的方式表达对新人的 祝福。不同的是，韩国人用白色的信封装礼金，中国人用红色的。白 色在韩国意味着正式，而红色在中国代表喜庆。中国人送礼金的讲究 还有很多，比如红包的钱数最好包含“6”“8”“9”这种吉利的数 字，红包上面要写一些祝福语，等等。'},
  {id:9, title:'第9课 百年好合', text:'这是我第一次参加中国人的婚礼，觉得特别有意思！中国的婚礼 一般是在酒店举行的，包括接亲、婚礼仪式和宴会三个环节。首先是 接亲，新郎要想接到新娘，必须通过新娘朋友们准备的“考试”；然 后是婚礼仪式，现在很多中国人喜欢中西结合的婚礼，既有“喝交杯 酒”“敬改口茶”的环节，又有“交换戒指”“读誓言”的环节；最 后是宴会，新娘会换上传统的衣服，和新郎一起给客人敬酒，感谢大 家的到来。'},
  {id:10, title:'第10课 让还是不让？', text:'10. 如果有人提出插队的请求，应不应该答应呢？人们的意见分为两 种。马波罗认为应该，因为如果不答应，会觉得自己不够善良，心里 不安。答应了虽然会耽误一些时间，但也不会吃什么亏。然而，冯尚 德认为不应该。第一，排队是一个大家都应该遵守的规则，插队的人 本来就没有道理，因为他/她会让别人等待更久，这样不公平；第 二，如果你的后边还有人，答应别人插队，对后边的人也不太公平。'},
  {id:11, title:'第11课 相声真有意思！', text:'11. 中国有一种表演艺术叫“相声”。相声的表演风格很幽默，里面 有很多笑话，能逗观众们大笑。它的表演形式也很灵活，有很多种。 有的是一个人单独表演的，叫“单口相声”；有的是一个人配合另一 个人表演的，叫“对口相声”；也有好几个人合作表演的，这种叫 “群口相声”。表演相声不容易，相声演员有四门功课：说、学、 逗、唱，所以他们要多多练习。'},
  {id:12, title:'第12课 感谢爸妈教会我……', text:'12. 陈新阳的妈妈教会了她很多生活常识，还教她干活儿。这些知识 很实用，培养了新阳的生活能力，她觉得自己到哪儿都能生存下去。 朴智慧的妈妈教会了她很多规矩，告诉她与不同身份的人交往要注意 用不同的说话方式。这使智慧在与人交往时很懂礼貌，交往也更加顺 利。我的爸爸对我要求很严格，他不但辅导我学习，还教育我要勤 奋、刻苦。我在爸爸的影响下变得很优秀，考上了一所很好的大学。'},
  {id:13, title:'第13课 关上空调打开窗', text:'13. 生活中可以通过很多小事来节约用电，但是人们不太注意。天气 热的时候，人们为了凉快，喜欢开空调，但其实如果能打开窗户通 风，充分利用自然风调节室内的温度会更好。这样既换了空气，又省 了电。另外，有时人们离开房间时会忘了随手关灯，或者只是关闭电 器却不拔电源，这些都是不对的。如果电器设备长时间不用，最好断 掉电源，因为只要插着电源，就会耗电。'},
  {id:14, title:'第14课 物美还是价廉', text:'14. 买东西的时候，每个人关注的重点不同。有的人觉得商品的质量 是第一位的，此外，样式也比较重要，因为美好的东西能带给人好心 情，提升幸福感。俗话说“一分钱一分货”，价格高的商品一般质量 更可靠，样式也更好。有的人认为物美价廉最重要，价格便宜的话， 花相同的钱可以买到更多东西，即使坏了也没关系。还有的人关注性 价比，愿意花时间去挑选那些使用率高、价格合理的高性价比商品。'},
  {id:15, title:'第15课 端午节为什么吃粽子？', text:'15. 每年农历的五月初五是中国的传统节日—端午节。在端午节吃 粽子是重要的风俗之一。这个风俗是怎么来的呢？传说，与一位叫屈 原的爱国诗人有关。屈原是楚国的一位大官，他很热爱自己的国家。 楚国灭亡后，屈原很伤心，就跳江结束了自己的生命，这一天正是端 午节。后来每年端午节，老百姓为了纪念屈原，就把米饭包在竹叶 里，扔进江中喂鱼，因为他们认为鱼吃饱了就不会咬屈原的身体了。 这样的纪念方式后来慢慢形成了端午节吃粽子的风俗，并流传到了 今天。'},
  {id:16, title:'第16课 去度假', text:'16. 不同的人喜欢不同的度假方式。很多中国人喜欢出去旅游，逛逛 有名的景点，尝尝特色美食。俗话说“读万卷书，行万里路”，旅游 可以让我们学到很多书本以外的知识。因为德国冬天很漫长，夏天又 比较短，阳光不充足，所以不少德国人会去阳光好的地方度假，散散 步、晒晒太阳，好好放松一下。法国人爱去南部海边晒太阳、吹海 风，这也是因为法国南部的阳光比较好。还有一些法国人愿意去农村 度假，因为生活在大城市的人们希望能拥抱大自然。'},
];

':'lè','美':'měi','丽':'lì','好':'hǎo','坏':'huài','真':'zhēn','假':'jiǎ','善':'shàn','恶':'è','非':'fēi','半':'bàn','全':'quán','所':'suǒ'};
function kyPy(t){return t.split('').map(function(c){return PY_MAP[c]||'';})}

var kySelected=0, kyShowPy=0, kyTrOn=0, kyTrLang='en';

function showLessons() {
  var h = '<div class="c" style="max-width:800px"><div style="text-align:center;padding:20px"><h2 style="font-size:22px">🎤 Speaking Exam Practice</h2></div>';
  h += '<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px">';
  for (var i=0; i<KY_LESSONS.length; i++) {
    h += '<button class="btn" onclick="showLessonText('+KY_LESSONS[i].id+')" id="kyBtn'+KY_LESSONS[i].id+'" style="font-size:11px">'+KY_LESSONS[i].title+'</button>';
  }
  h += '</div><div id="kyToolbar" style="text-align:center;margin-bottom:10px;display:none">';
  h += '<button class="btn" onclick="kyRead()" style="font-size:12px">🔊 Read</button>';
  h += '<button class="btn" onclick="kyStop()" style="font-size:12px">⏹ Stop</button>';
  h += '<button class="btn" onclick="kyTogglePy()" id="kyPyBtn" style="font-size:12px">🔤 Pinyin</button>';
  h += '<button class="btn" onclick="kyToggleTr()" id="kyTrBtn" style="font-size:12px">🌐 Translate</button>';
  h += '<span id="kyLangPick" style="display:none;gap:4px;margin-left:4px">';
  h += '<button class="btn" onclick="kySetTr(&apos;en&apos;)" id="kyTrEn" style="font-size:11px">🇬🇧</button>';
  h += '<button class="btn" onclick="kySetTr(&apos;ru&apos;)" id="kyTrRu" style="font-size:11px">🇷🇺</button>';
  h += '<button class="btn" onclick="kySetTr(&apos;tr&apos;)" id="kyTrTr" style="font-size:11px">🇹🇷</button>';
  h += '<button class="btn" onclick="kySetTr(&apos;ko&apos;)" id="kyTrKo" style="font-size:11px">🇰🇷</button>';
  h += '</span></div>';
  h += '<div id="kyTextDisplay" style="padding:20px;background:#1a1a3e;border-radius:15px;border:1px solid rgba(124,92,191,0.15);line-height:2;font-size:17px;min-height:200px;text-align:left;color:#e0e0f0;">👆 Select a lesson</div>';
  h += '<div id="kyTrDisplay" style="padding:15px;background:rgba(76,175,80,0.08);border:1px solid rgba(76,175,80,0.15);border-radius:12px;line-height:1.7;font-size:14px;min-height:30px;margin-top:10px;text-align:left;color:#a0d0a0;display:none;"></div></div>';
  document.getElementById('lessonsView').innerHTML = h;
  
}

function showLessonText(id) {
  kySelected = id;
  var btns = document.querySelectorAll('[id^="kyBtn"]');
  for (var i=0; i<btns.length; i++) btns[i].classList.remove('a');
  var b = document.getElementById('kyBtn'+id);
  if (b) b.classList.add('a');
  document.getElementById('kyToolbar').style.display = 'block';
  renderLessonText(KY_LESSONS[id-1].text);
}

function renderLessonText(text) {
  var h = '';
  for (var i = 0; i < text.length; i++) {
    var ch = text[i];
    if (ch >= '\u4e00' && ch <= '\u9fff') {
      var py = kyPy(ch);
      h += '<span style="display:inline-block;text-align:center;margin:0 1px;vertical-align:middle;"><span class="kyCh">'+ch+'</span><span class="kyPy" style="display:'+(kyShowPy?'block':'none')+';font-size:10px;color:#5b8def;line-height:1.2">'+py+'</span></span>';
    } else {
      h += '<span>'+ch+'</span>';
    }
  }
  document.getElementById('kyTextDisplay').innerHTML = h;
}

function kyRead() {
  if (!kySelected) return;
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(KY_LESSONS[kySelected-1].text);
    u.lang = 'zh-CN';
    u.rate = 0.8;
    window.speechSynthesis.speak(u);
  }
}

function kyStop() { if (window.speechSynthesis) window.speechSynthesis.cancel(); }

function kyTogglePy() {
  kyShowPy = !kyShowPy;
  document.getElementById('kyPyBtn').textContent = kyShowPy ? '🔤 Pinyin ✓' : '🔤 Pinyin';
  if (kySelected) renderLessonText(KY_LESSONS[kySelected-1].text);
}

function kyToggleTr() {
  kyTrOn = !kyTrOn;
  document.getElementById('kyTrBtn').textContent = kyTrOn ? '🌐 Translate ✓' : '🌐 Translate';
  document.getElementById('kyLangPick').style.display = kyTrOn ? 'inline-flex' : 'none';
  if (kyTrOn && kySelected) kyShowTr();
  else document.getElementById('kyTrDisplay').style.display = 'none';
}

function kySetTr(l) {
  kyTrLang = l;
  var btns2 = document.querySelectorAll('#kyLangPick .btn');
  for (var i=0; i<btns2.length; i++) btns2[i].style.border='1px solid rgba(124,92,191,0.3)';
  var idMap = {'en':'kyTrEn','ru':'kyTrRu','tr':'kyTrTr','ko':'kyTrKo'};
  var b = document.getElementById(idMap[l]);
  if (b) b.style.border='1px solid #5b8def';
  if (kySelected) kyShowTr();
}

function kyShowTr() {
  var d = document.getElementById('kyTrDisplay');
  var trData = JSON.parse(document.getElementById('kyTrData').textContent);
  var t = trData[kySelected];
  d.textContent = t ? t[kyTrLang] : '';
  d.style.display = 'block';
}

</script>
</body>
</html>
